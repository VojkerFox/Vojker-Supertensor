name: The AccountorPro CI/CD (Poka-Yoke)

on:
  push:
    branches: ["The_AccountorPro", "main"]
  pull_request:
    branches: ["main"]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Hae koodi (Checkout)
        uses: actions/checkout@v4

      - name: Asenna Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          pip install pytest jax jaxlib dataclasses numpy

      - name: Aja Poka-Yoke Testit (RED/GREEN)
        # Eristetään testaus vain puhtaaseen JAX-matematiikkaan, 
        # koska Linux-runner ei tue Windowsin MetaTrader5-kirjastoa.
        run: |
          PYTHONPATH=. pytest leveraged_core/tests/ tests/test_logic.py -v